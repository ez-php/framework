name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # --------------------------------------------------------------------------
  # Dependency audit — catch known CVEs in dev dependencies early
  # --------------------------------------------------------------------------
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Composer install
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Audit dependencies
        run: composer audit

  # --------------------------------------------------------------------------
  # Matrix build — PHP 8.5 (required) + nightly (experimental)
  # Runs PHPStan, CS Fixer, and PHPUnit directly on host PHP.
  # MySQL service container is started for DatabaseTest and MigratorTest.
  # --------------------------------------------------------------------------
  test:
    name: PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ez-php
          MYSQL_USER: ez-php
          MYSQL_PASSWORD: ez-php
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.5']
        experimental: [false]
        include:
          - php-version: 'nightly'
            experimental: true

    env:
      DB_HOST: 127.0.0.1
      DB_DATABASE: ez-php
      DB_USERNAME: ez-php
      DB_PASSWORD: ez-php
      DB_TESTING_DATABASE: ez-php_testing

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: pdo_mysql
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php${{ matrix.php-version }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php${{ matrix.php-version }}-composer-

      - name: Composer install
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Create testing database
        run: mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS \`ez-php_testing\`; GRANT ALL ON \`ez-php_testing\`.* TO 'ez-php'@'%';"

      - name: PHPStan
        run: vendor/bin/phpstan analyse

      - name: CS Fixer (check only)
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

      - name: PHPUnit
        run: vendor/bin/phpunit

  # --------------------------------------------------------------------------
  # Tag — create version tag from composer.json on successful main builds
  # --------------------------------------------------------------------------
  tag:
    needs: [audit, test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "value=$(jq -r '.version // empty' composer.json)" >> "$GITHUB_OUTPUT"

      - name: Create tag if not exists
        if: steps.version.outputs.value != ''
        env:
          TAG: v${{ steps.version.outputs.value }}
        run: |
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists, skipping."
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "Tagged $TAG"
          fi
